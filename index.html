<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>OneTap MEGA PRO</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="container">
    <div id="muteBtn">🔊</div>

    <!-- מסך ראשי -->
    <div id="mainMenu" class="screen">
      <div class="menu-content">
        <h1>OneTap MEGA PRO</h1>
        <p class="subtitle">משחק הטאפ האולטימטיבי</p>
        <div class="menu-buttons">
          <button class="btn-main" id="btnSkins">🎨 סקינים</button>
          <button class="btn-main" id="btnPlay">🎮 התחל משחק</button>
          <button class="btn-main" id="btnLeaderboard">🏆 לוח תוצאות</button>
          <button class="btn-main" id="btnShop">🛒 חנות</button>
        </div>
      </div>
    </div>

    <!-- תפריט סקינים -->
    <div id="skinsMenu" class="screen" style="display:none;">
      <div class="menu-content">
        <h2>🎨 בחר סקין</h2>
        <div id="skinsGrid">
          <div class="skin-option" id="skin-blue">🔵</div>
          <div class="skin-option" id="skin-fire">🔥</div>
          <div class="skin-option" id="skin-star">⭐</div>
          <div class="skin-option" id="skin-ufo">🛸</div>
        </div>
        <button class="btn-back" id="backFromSkins">← חזרה</button>
      </div>
    </div>

    <!-- חנות -->
    <div id="shopMenu" class="screen" style="display:none;">
      <div class="menu-content">
        <h2>🛒 חנות כוחות</h2>
        <div class="coins-display">💰 מטבעות: <span id="shopCoins">0</span></div>
        <div id="powerUpsGrid">
          <div class="power-up-item" id="shield-buy" data-cost="100">
            <div class="power-icon">🛡️</div>
            <h3>מגן</h3>
            <p>מגן מפני פגיעה אחת</p>
            <div class="power-price">100💰</div>
          </div>
        </div>
        <button class="btn-back" id="backFromShop">← חזרה</button>
      </div>
    </div>

    <!-- לוח תוצאות -->
    <div id="leaderboardMenu" class="screen" style="display:none;">
      <div class="menu-content">
        <h2>🏆 TOP 5</h2>
        <div id="scoresList">טוען...</div>
        <button class="btn-back" id="backFromLeaderboard">← חזרה</button>
      </div>
    </div>

    <!-- מסך משחק -->
    <div id="gameScreen" class="screen" style="display:none; background: transparent;">
      <div class="game-header">
        <div class="score-box">ניקוד: <span id="score">0</span></div>
        <div class="score-box coins-inline">💰 <span id="coinsDisplay">0</span></div>
      </div>
      <canvas id="game"></canvas>

      <div id="overlay">
        <div id="gameover">GAME OVER</div>
        <input type="text" id="playerName" placeholder="הכנס שם שחקן" maxlength="12">
        <div class="menu-buttons">
            <button id="retry" class="btn-main">שחק שוב</button>
            <button id="homeBtn" class="btn-back">חזרה לתפריט</button>
        </div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
