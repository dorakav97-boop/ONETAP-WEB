<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>OneTap MEGA PRO</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="container">
    <div id="muteBtn">🔊</div>

    <div id="mainMenu" class="screen">
      <div class="menu-content">
        <h1>OneTap MEGA PRO</h1>
        <p class="subtitle">משחק הטאפ האולטימטיבי</p>
        <div class="menu-buttons">
          <button class="btn-main" id="btnSkins">🎨 סקינים</button>
          <button class="btn-main" id="btnPlay">🎮 התחל משחק</button>
          <button class="btn-main" id="btnLeaderboard">🏆 לוח תוצאות</button>
          <button class="btn-main" id="btnShop">🛒 חנות</button>
        </div>
      </div>
    </div>

    <div id="skinsMenu" class="screen" style="display:none;">
      <div class="menu-content">
        <h2>🎨 בחר סקין</h2>
        <div id="skinsGrid">
          <div class="skin-option active" id="skin-blue">🔵</div>
          <div class="skin-option" id="skin-fire">🔥</div>
          <div class="skin-option" id="skin-star">⭐</div>
          <div class="skin-option" id="skin-ufo">🛸</div>
        </div>
        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        <button class="btn-main" id="btnUpload" style="background: #8b5cf6;">📷 העלה תמונה מהאייפון</button>
        <button class="btn-back" id="backFromSkins">← חזרה</button>
      </div>
    </div>

    <div id="shopMenu" class="screen" style="display:none;">
      <div class="menu-content">
        <h2>🛒 חנות</h2>
        <div class="coins-display">💰 מטבעות: <span id="shopCoins">0</span></div>
        <div id="powerUpsGrid">
          <div class="power-up-item" id="buy-shield">
            <div class="power-icon">🛡️</div>
            <h3>מגן (עד 3)</h3>
            <div class="power-price">75💰</div>
          </div>
          <div class="power-up-item" id="buy-slow">
            <div class="power-icon">⏱️</div>
            <h3>מאט קצב (עד 3)</h3>
            <div class="power-price">150💰</div>
          </div>
        </div>
        <button class="btn-back" id="backFromShop">← חזרה</button>
      </div>
    </div>

    <div id="leaderboardMenu" class="screen" style="display:none;">
      <div class="menu-content">
        <h2>🏆 TOP 5</h2>
        <div id="scoresList">טוען...</div>
        <button class="btn-back" id="backFromLeaderboard">← חזרה</button>
      </div>
    </div>

    <div id="gameScreen" class="screen" style="display:none; background: transparent;">
      <div class="game-header">
        <div class="score-box">LEVEL: <span id="levelText">1</span></div>
        <div class="score-box">SCORE: <span id="score">0</span></div>
        <div class="score-box coins-inline">💰 <span id="coinsDisplay">0</span></div>
      </div>
      
      <!-- תצוגת יכולות פעילות -->
      <div id="active-powers">
        <span id="shield-count">🛡️ x0</span>
        <span id="slow-count">⏱️ x0</span>
      </div>

      <canvas id="game"></canvas>

      <div id="overlay">
        <div id="gameover">GAME OVER</div>
        <div id="revive-section">
            <button id="btnRevive" class="btn-main" style="background: #10b981;">❤️ קנה חיים (<span id="reviveCost">300</span>💰)</button>
        </div>
        <input type="text" id="playerName" placeholder="שם שחקן" maxlength="12">
        <div class="menu-buttons">
            <button id="retry" class="btn-main">שחק שוב</button>
            <button id="homeBtn" class="btn-back">חזרה לתפריט</button>
        </div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
