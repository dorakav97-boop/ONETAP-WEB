<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>OneTap - World Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="high">High: 0</div>
  </div>
  
  <canvas id="game"></canvas>
  
  <div id="overlay" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div id="gameover" style="color: white; font-size: 32px; margin-bottom: 20px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Tap to Start</div>
    
    <!-- תיבת הזנת שם משופרת -->
    <input type="text" id="playerName" placeholder="Enter Your Name" 
      style="padding: 12px; margin: 10px; border-radius: 8px; border: 2px solid #06b6d4; text-align: center; font-size: 18px; width: 250px; outline: none; background: rgba(255,255,255,0.9);">
    
    <!-- כפתור התחלה -->
    <button id="retry" style="padding: 15px 30px; font-size: 20px; cursor: pointer; background-color: #06b6d4; color: white; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s;">Start Game</button>
    
    <!-- טבלת שיאים עולמית -->
    <div id="leaderboard" style="color: white; margin-top: 30px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 12px; min-width: 250px; text-align: center; border: 1px solid #06b6d4;">
        <h3 style="margin-bottom: 15px; color: #06b6d4; border-bottom: 1px solid #06b6d4; padding-bottom: 5px;">World Top 5</h3>
        <div id="scoresList" style="font-size: 18px; line-height: 1.6;">Loading scores...</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
