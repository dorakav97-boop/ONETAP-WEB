<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>OneTap PRO</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="high">High: 0</div>
    <div id="shieldStatus" style="color: #38bdf8; font-weight: bold;"></div>
  </div>
  
  <canvas id="game"></canvas>
  
  <div id="overlay">
    <div id="gameover">OneTap PRO</div>
    <input type="text" id="playerName" placeholder="Your Name" maxlength="12">
    <button id="retry">Start Game</button>
    <button id="shareBtn" style="background: #25D366; display:none;">WhatsApp Share</button>
    
    <div id="leaderboard">
        <h3 style="margin:0 0 10px 0; color:#06b6d4;">🏆 Top Scores</h3>
        <div id="scoresList">Loading...</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
