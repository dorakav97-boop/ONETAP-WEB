<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneTap MEGA PRO - משחק הטאפ האולטימטיבי</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <div id="container">
        <!-- כפתור מיוט -->
        <div id="muteBtn">🔊</div>

        <!-- תפריט ראשי -->
        <div id="mainMenu" class="screen">
            <div class="menu-content">
                <h1>OneTap MEGA PRO</h1>
                <p class="subtitle">משחק הטאפ האולטימטיבי</p>
                
                <div class="menu-buttons">
                    <button class="btn-main" onclick="showSkins()">🎨 סקינים</button>
                    <button class="btn-main" onclick="startGame()">🎮 התחל משחק</button>
                    <button class="btn-main" onclick="showLeaderboard()">🏆 לוח תוצאות</button>
                    <button class="btn-main" onclick="showShop()">🛒 חנות</button>
                </div>
            </div>
        </div>

        <!-- תפריט סקינים -->
        <div id="skinsMenu" class="screen" style="display:none;">
            <div class="menu-content">
                <h2>🎨 בחר סקין</h2>
                <div id="skinsGrid">
                    <div class="skin-option active" data-skin="default" data-emoji="🔵">🔵 קלסי</div>
                    <div class="skin-option" data-skin="fire" data-emoji="🔥">🔥 אש</div>
                    <div class="skin-option" data-skin="star" data-emoji="⭐">⭐ כוכב</div>
                    <div class="skin-option" data-skin="diamond" data-emoji="💎">💎 יהלום</div>
                    <div class="skin-option" data-skin="heart" data-emoji="❤️">❤️ לב</div>
                    <div class="skin-option" data-skin="lightning" data-emoji="⚡">⚡ ברק</div>
                    <div class="skin-option upload-option" onclick="uploadCustomSkin()">📁 העלה תמונה</div>
                </div>
                <input type="file" id="customSkinInput" accept="image/*" style="display:none;">
                <button class="btn-back" onclick="showMainMenu()">← חזרה</button>
            </div>
        </div>

        <!-- חנות כוחות -->
        <div id="shopMenu" class="screen" style="display:none;">
            <div class="menu-content">
                <h2>🛒 חנות כוחות</h2>
                <div class="coins-display">💰 מטבעות: <span id="shopCoins">0</span></div>
                <div id="powerUpsGrid">
                    <div class="power-up-item" data-power="shield">
                        <div class="power-icon">🛡️</div>
                        <h3>מגן</h3>
                        <p>הגנ
