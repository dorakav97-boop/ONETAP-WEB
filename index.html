<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OneTap Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="high">High: 0</div>
  </div>
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="gameover">Tap to Start</div>
    <input type="text" id="playerName" placeholder="Enter your name" style="padding: 10px; margin: 10px; border-radius: 5px; border: none; text-align: center;">
    <button id="retry">Start Game</button>
    
    <div id="leaderboard" style="color: white; margin-top: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; min-width: 200px; text-align: center;">
        <h3 style="margin-bottom: 10px;">World Top 5</h3>
        <div id="scoresList">Loading...</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
