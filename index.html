<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>OneTap SUPREME</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="ui">
    <p id="score">0</p>
    <div id="combo-info"></div>
  </div>
  <canvas id="game"></canvas>
  
  <div id="overlay">
    <div id="gameover">SUPREME ARENA</div>
    
    <div id="skin-shop">
        <div class="skin-item active" onclick="setSkin(0)">🔥</div>
        <div class="skin-item" onclick="setSkin(1)">💎</div>
        <div class="skin-item" onclick="setSkin(2)">🌈</div>
        <div class="skin-item" onclick="setSkin(3)">⚡</div>
        <div class="skin-item" onclick="setSkin(4)">💀</div>
    </div>

    <input type="text" id="playerName" placeholder="Enter Nickname" maxlength="10">
    <button id="start-btn">START BATTLE</button>
    
    <div id="leaderboard">
        <h3 style="color: #06b6d4; margin-top: 0;">👑 WORLD LEGENDS</h3>
        <div id="scoresList">Loading...</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
