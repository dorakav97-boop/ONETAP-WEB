<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>OneTap MEGA PRO</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="ui">
    <div id="score">0</div>
    <div id="high">High: 0</div>
    <div id="shieldStatus"></div>
  </div>
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="gameover">OneTap MEGA</div>
    <input type="text" id="playerName" placeholder="Enter Nickname" maxlength="12">
    <button id="retry">PLAY NOW</button>
    <button id="shareWA" style="background: #25D366; display:none; margin-bottom: 5px;">Share to WhatsApp 📱</button>
    <button id="shareTG" style="background: #0088cc; display:none;">Share to Telegram ✈️</button>
    <div id="leaderboard">
        <h3>🏆 WORLD LEADERS</h3>
        <div id="scoresList">Loading...</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
